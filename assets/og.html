<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --paper:  #F6F4EF;
    --paper2: #FBFAF6;
    --ink:    #31414D;
    --ink-soft:#5E6D77;
    --ink-faint:#8B98A0;
    --rule:   #DEDACF;
    --green:  #2FA37C;
    --green-dk:#24805F;
    --clay:   #D98A5A;
    --clay-dk:#C06E3D;
    --green-wash:#E3F1EB;
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(1100px 560px at 90% -12%, var(--green-wash), transparent 60%),
      linear-gradient(180deg, var(--paper2), var(--paper) 80%);
    font-family: var(--sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  /* faint ruled-ledger lines behind everything */
  .rules { position: absolute; inset: 0; opacity: 0.5; }
  .rules line { stroke: var(--rule); stroke-width: 1.4; }

  .frame {
    position: absolute; inset: 0;
    padding: 78px 84px;
    display: grid;
    grid-template-columns: 1.12fr 0.88fr;
    gap: 56px;
    align-items: center;
  }

  /* left: wordmark + headline */
  .brand { display: flex; align-items: center; gap: 18px; }
  .brand svg { width: 62px; height: 62px; }
  .brand .word { font-size: 46px; font-weight: 800; letter-spacing: -0.035em; color: var(--ink); }

  .headline { margin-top: 40px; }
  .headline h1 {
    font-size: 62px; font-weight: 800; letter-spacing: -0.03em;
    line-height: 1.08; color: var(--ink); max-width: 15ch;
  }
  .headline .accent { color: var(--green); }
  .headline p {
    margin-top: 26px;
    font-size: 27px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--ink-soft); line-height: 1.35; max-width: 32ch;
  }

  /* right: the receipt signature */
  .receipt {
    background: var(--paper2);
    border: 1px solid var(--rule);
    border-radius: 18px;
    box-shadow: 0 30px 60px -30px rgba(49,65,77,0.4);
    padding: 30px 32px 32px;
    position: relative;
  }
  .receipt::before {
    content: ""; position: absolute; left: 0; right: 0; top: 0; height: 6px;
    border-radius: 18px 18px 0 0;
    background: repeating-linear-gradient(90deg, var(--clay) 0 18px, var(--green) 18px 36px);
    opacity: 0.9;
  }
  .r-head {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 16px; margin-bottom: 8px;
    border-bottom: 1.5px dashed var(--rule);
  }
  .r-title { font-size: 20px; font-weight: 600; color: var(--ink-soft); }
  .r-tag {
    font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--green-dk); background: var(--green-wash);
    border: 1px solid var(--green); border-radius: 999px; padding: 5px 13px;
  }
  .row {
    display: flex; align-items: baseline; gap: 12px;
    padding: 15px 0; font-size: 25px;
    font-family: var(--mono); font-variant-numeric: tabular-nums;
  }
  .row + .row { border-top: 1px solid var(--rule); }
  .row .name { font-weight: 700; color: var(--clay-dk); font-family: var(--sans); }
  .row .to { font-weight: 700; color: var(--green-dk); font-family: var(--sans);
    display: inline-flex; align-items: baseline; gap: 12px; flex: 1; }
  .row .pays { font-size: 19px; color: var(--ink-faint); font-weight: 500; font-family: var(--sans); }
  .row .to::after {
    content: ""; flex: 1; min-width: 20px; margin: 0 2px 5px;
    border-bottom: 3px dotted var(--rule); align-self: flex-end;
  }
  .row .amt { font-weight: 700; color: var(--ink); }
  .r-foot {
    margin-top: 16px; padding-top: 16px;
    border-top: 1.5px dashed var(--rule);
    font-size: 17px; color: var(--ink-faint);
  }
</style>
</head>
<body>
  <svg class="rules" viewBox="0 0 1200 630" preserveAspectRatio="none" aria-hidden="true">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="215" x2="1200" y2="215"/>
    <line x1="0" y1="310" x2="1200" y2="310"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </svg>

  <div class="frame">
    <div>
      <div class="brand">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="#31414D"/>
          <line x1="8" y1="12" x2="24" y2="12" stroke="#D98A5A" stroke-width="2.1" stroke-linecap="round"/>
          <line x1="8" y1="20" x2="24" y2="20" stroke="#2FA37C" stroke-width="2.1" stroke-linecap="round"/>
          <circle cx="8" cy="12" r="2.1" fill="#D98A5A"/>
          <circle cx="24" cy="20" r="2.1" fill="#2FA37C"/>
        </svg>
        <span class="word">evensplit</span>
      </div>
      <div class="headline">
        <h1>Who owes whom,<br><span class="accent">in the fewest transfers.</span></h1>
        <p>A calm rent &amp; shared-bill splitter for roommates.</p>
      </div>
    </div>

    <div class="receipt">
      <div class="r-head">
        <span class="r-title">Flat 3B &middot; example</span>
        <span class="r-tag">settled</span>
      </div>
      <div class="row"><span class="name">Ali</span><span class="pays">pays</span><span class="to">Ben</span><span class="amt">₹1,240</span></div>
      <div class="row"><span class="name">Priya</span><span class="pays">pays</span><span class="to">Ben</span><span class="amt">₹860</span></div>
      <div class="row"><span class="name">Priya</span><span class="pays">pays</span><span class="to">Chen</span><span class="amt">₹315</span></div>
      <p class="r-foot">3 payments clear a 4-person house of 11 shared bills.</p>
    </div>
  </div>
</body>
</html>
